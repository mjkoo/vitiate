version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    groups:
      npm-all:
        patterns:
          - "*"
    ignore:
      # examples/flatted-vuln pins the vulnerable flatted 3.4.1 on purpose to
      # fuzz the prototype-pollution bug; bumping it patches the bug away.
      - dependency-name: "flatted-vulnerable"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      cargo-all:
        patterns:
          - "*"
    ignore:
      # Pin sha2 to the 0.10 chain: bumping to 0.11 forks the whole RustCrypto
      # stack (sha2/digest/crypto-common/block-buffer/cpufeatures) against
      # swc_core's transitive 0.10 chain, which cargo-deny's multiple-versions
      # ban (correctly) rejects. Drop this ignore once swc_core moves to 0.11.
      - dependency-name: "sha2"
        versions: [">=0.11"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions-all:
        patterns:
          - "*"
