name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      test-macos:
        description: "Run macOS test job"
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - uses: EmbarkStudios/cargo-deny-action@v2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Format check
        run: cargo fmt --check && pnpm exec prettier --check .

      - name: Type check
        run: pnpm exec turbo run check

      - name: MSRV check
        run: |
          cargo install cargo-msrv --locked
          cargo msrv verify --rust-version \
            "$(cargo metadata --format-version 1 --no-deps |
               jq -r '[.packages[].rust_version // empty] | unique |
                       if length == 1 then .[0]
                       else error("inconsistent MSRVs: \(.)") end')"

      - name: Autoinherit check
        run: |
          cargo install cargo-autoinherit --locked
          cargo autoinherit --prefer-simple-dotted
          git diff --exit-code -- Cargo.toml */Cargo.toml

  test:
    name: Test (${{ matrix.os == 'ubuntu-latest' && 'Linux' || 'Windows' }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --workspace

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: JS test
        run: pnpm exec turbo run test

      - name: Instrumentation test
        run: pnpm run test:instrumentation

      - name: E2E test
        run: pnpm run test:e2e
        timeout-minutes: 5

      - name: ESLint
        if: runner.os == 'Linux'
        run: pnpm exec eslint .

  test-macos:
    name: Test (macOS ${{ matrix.arch }})
    if: inputs.test-macos == true
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            arch: ARM64
          - runner: macos-15-intel
            arch: x86_64
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --workspace

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: JS test
        run: pnpm exec turbo run test

      - name: Instrumentation test
        run: pnpm run test:instrumentation

      - name: E2E test
        run: pnpm run test:e2e
        timeout-minutes: 5

  test-musl:
    name: Test (musl)
    runs-on: ubuntu-latest
    container:
      image: node:22-alpine
    steps:
      - name: Install system dependencies
        run: apk add --no-cache build-base python3 git curl bash libucontext-dev

      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --workspace

      - run: corepack enable && corepack prepare pnpm@10.30.2 --activate

      - name: Fix git ownership (container runs as different user)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: JS test
        run: pnpm exec turbo run test

      - name: Instrumentation test
        run: pnpm run test:instrumentation

      - name: E2E test
        run: pnpm run test:e2e
        timeout-minutes: 5
