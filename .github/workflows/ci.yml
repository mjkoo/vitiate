name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89"
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - uses: EmbarkStudios/cargo-deny-action@v2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Format check
        run: cargo fmt --check && pnpm exec prettier --check .

      - name: Type check
        run: pnpm exec turbo run check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89"
          components: clippy
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --workspace

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: JS test
        run: pnpm exec turbo run test

      - name: ESLint
        run: pnpm exec eslint .

  build-musl:
    name: Build (linux-x64-musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89"
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Build musl binary
        run: cd vitiate-napi && pnpm exec napi build --platform --release --target x86_64-unknown-linux-musl --cross-compile

  check-windows:
    name: Check (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89"
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --workspace
