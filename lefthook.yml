colors: false
skip_in_ci: true

pre-commit:
  parallel: true
  commands:
    format-check:
      env:
        TERM: dumb
      run: cargo fmt --check && pnpm exec prettier --check .

    eslint:
      glob: "*.{ts,js,mjs}"
      run: pnpm exec eslint .

    rust-clippy:
      glob: "*.rs"
      run: cargo clippy --workspace --all-targets -- --deny warnings

    rust-doc:
      glob: "*.rs"
      run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

    rust-deny:
      glob: "{*.rs,*.toml,Cargo.lock}"
      # Use --offline here: an online advisory-db fetch inside the pre-commit
      # stash window collides with tree-building and aborts the commit. The db
      # is refreshed by the pre-push hook below and by CI instead.
      run: cargo deny --offline check

    rust-msrv:
      glob: "{*.rs,*.toml,Cargo.lock}"
      run: >
        cargo msrv verify --rust-version
        "$(cargo metadata --format-version 1 --no-deps |
           jq -r '[.packages[].rust_version // empty] | unique |
                   if length == 1 then .[0]
                   else error("inconsistent MSRVs: \(.)") end')"

    ts-typecheck:
      glob: "*.ts"
      run: pnpm exec tsc --noEmit

    no-fancy-dashes:
      glob: "*.{ts,js,mjs,rs,md,mdx,json,yml,yaml,toml}"
      run: >
        ! grep -rPn '[\x{2013}\x{2014}]' {staged_files} ||
        { echo "Found em-dash or en-dash characters. Use plain hyphens instead."; exit 1; }

    rust-autoinherit:
      glob: "*.toml"
      run: >
        cargo autoinherit --prefer-simple-dotted &&
        git diff --exit-code -- Cargo.toml */Cargo.toml ||
        { git checkout -- Cargo.toml */Cargo.toml;
          echo "Run: cargo autoinherit --prefer-simple-dotted"; exit 1; }

pre-push:
  commands:
    # Full online advisory check + advisory-db refresh. Runs at push time,
    # outside the pre-commit stash window, so it stays current without the
    # tree-building collision that an online fetch causes during a commit.
    rust-deny:
      run: cargo deny check

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
