colors: true
skip_in_ci: true

pre-commit:
  parallel: true
  commands:
    format-check:
      run: treefmt --ci

    eslint:
      glob: "*.{ts,js,mjs}"
      run: pnpm exec eslint .

    rust-clippy:
      glob: "*.rs"
      run: cargo clippy --workspace --all-targets -- --deny warnings

    rust-deny:
      glob: "{*.rs,*.toml,Cargo.lock}"
      run: cargo deny check

    rust-msrv:
      glob: "{*.rs,*.toml,Cargo.lock}"
      run: >
        cargo msrv verify --rust-version
        "$(cargo metadata --format-version 1 --no-deps |
           jq -r '[.packages[].rust_version // empty] | unique |
                   if length == 1 then .[0]
                   else error("inconsistent MSRVs: \(.)") end')"

    ts-typecheck:
      glob: "*.ts"
      run: pnpm exec tsc --noEmit

    rust-autoinherit:
      glob: "*.toml"
      run: >
        cargo autoinherit --prefer-simple-dotted &&
        git diff --exit-code -- Cargo.toml */Cargo.toml ||
        { git checkout -- Cargo.toml */Cargo.toml;
          echo "Run: cargo autoinherit --prefer-simple-dotted"; exit 1; }

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
