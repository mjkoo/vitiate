packages:
  - vitiate
  - vitiate-core
  - vitiate-engine
  - vitiate-engine/npm/*
  - vitiate-fuzzed-data-provider
  - vitiate-swc-plugin
  - examples/*
  - docs

auditConfig:
  ignoreGhsas:
    # examples/flatted-vuln intentionally pins the vulnerable flatted@3.4.1
    # (aliased as flatted-vulnerable) as a prototype-pollution test fixture;
    # the bug is patched in 3.4.2 but we fuzz the vulnerable line on purpose.
    # The flatted override below does not upgrade the alias, so suppress this
    # one known advisory here. https://github.com/advisories/GHSA-rf6f-7fwh-wjgh
    - GHSA-rf6f-7fwh-wjgh

onlyBuiltDependencies:
  - "@optique/core"
  - "@optique/run"
  - "@swc/core"
  - esbuild
  - lefthook
  - sharp

overrides:
  flatted@<=3.4.1: ">=3.4.2"
  # astro transitively pins esbuild <0.28.1 (GHSA-g7r4-m6w7-qqqr, dev-server
  # arbitrary file read on Windows). Force the patched line; drop once astro
  # ships a release that depends on esbuild >=0.28.1.
  esbuild@<0.28.1: ">=0.28.1"
