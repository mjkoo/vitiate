packages:
  - vitiate
  - vitiate-core
  - vitiate-engine
  - vitiate-engine/npm/*
  - vitiate-fuzzed-data-provider
  - vitiate-swc-plugin
  - examples/*
  - docs

onlyBuiltDependencies:
  - "@optique/core"
  - "@optique/run"
  - "@swc/core"
  - esbuild
  - lefthook
  - sharp

overrides:
  flatted@<=3.4.1: ">=3.4.2"
  # astro transitively pins esbuild <0.28.1 (GHSA-g7r4-m6w7-qqqr, dev-server
  # arbitrary file read on Windows). Force the patched line; drop once astro
  # ships a release that depends on esbuild >=0.28.1.
  esbuild@<0.28.1: ">=0.28.1"
