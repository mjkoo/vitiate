[workspace]
members = ["vitiate-instrument", "vitiate-napi"]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.89"
license = "MIT"
license-file = "LICENSE"

[workspace.dependencies]
libafl = { git = "https://github.com/AFLplusplus/LibAFL", branch = "main", default-features = false, features = ["std", "derive", "serdeany_autoreg"] }
libafl_bolts = { git = "https://github.com/AFLplusplus/LibAFL", branch = "main", default-features = false, features = ["std", "derive", "serdeany_autoreg"] }
napi = "3.0.0"
napi-build = "2"
napi-derive = "3.0.0"
serde = "1"
swc_core = "57.0.*"
ryu-js = "1"
serde_json = "1"
cc = "1"
libc = "0.2"

[workspace.lints.clippy]
all = "deny"

[profile.release]
lto = true
strip = "symbols"
