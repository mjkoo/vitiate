[advisories]
ignore = [
  # Unmaintained transitive dependencies from swc_ecma_transforms_testing
  "RUSTSEC-2021-0139", # ansi_term
  "RUSTSEC-2020-0095", # difference
  # Unmaintained transitive dependency from libafl
  "RUSTSEC-2025-0141", # bincode
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "BSL-1.0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]
exceptions = [
  { allow = ["MPL-2.0"], crate = "smartstring" },
  { allow = ["LGPL-2.1-or-later"], crate = "r-efi" },
]

[bans]
multiple-versions = "warn"
# Transitive duplicates from libafl (git main) and swc_core v57 that we can't resolve.
# cargo-deny will warn if any of these become unused after a future cargo update.
skip = [
  { crate = "arbitrary-int@1.3.0", reason = "libafl internal: bitbybit requires 1.x" },
  { crate = "cargo-platform@0.1.9", reason = "swc_core internal: testing uses cargo_metadata 0.18" },
  { crate = "cargo_metadata@0.18.1", reason = "swc_core internal: testing vs vergen" },
  { crate = "getrandom@0.3.4", reason = "libafl internal: fastbloom requires 0.3" },
  { crate = "hashbrown@0.14.5", reason = "swc hstr/allocator require 0.14" },
  { crate = "siphasher@0.3.11", reason = "swc_common requires 0.3" },
  { crate = "thiserror@1.0.69", reason = "swc_core testing transitive via cargo_metadata 0.18" },
  { crate = "thiserror-impl@1.0.69", reason = "follows thiserror 1.x" },
  { crate = "unicode-width@0.1.14", reason = "swc_core internal: miette requires 0.1" },
  { crate = "windows-sys@0.59.0", reason = "swc_core internal: stacker requires 0.59" },
]

[sources]
unknown-registry = "deny"
allow-git = ["https://github.com/mjkoo/LibAFL"]
