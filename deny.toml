[advisories]
# All suppressed advisories are for unmaintained transitive dependencies
# inherited from swc_core and libafl. These are not direct dependencies and
# cannot be resolved without upstream changes. Re-evaluate when bumping
# swc_core or libafl versions.
ignore = [
  # Unmaintained transitive dependencies from swc_ecma_transforms_testing
  "RUSTSEC-2021-0139", # ansi_term - unmaintained, no replacement in swc dep tree
  "RUSTSEC-2020-0095", # difference - unmaintained, used by swc testing internals
  # Unmaintained transitive dependency from libafl
  "RUSTSEC-2025-0141", # bincode - transitive via libafl serialization
]

[licenses]
unused-allowed-license = "allow"
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "BSL-1.0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]
exceptions = [
  { allow = ["MPL-2.0"], crate = "smartstring" },
  { allow = ["LGPL-2.1-or-later"], crate = "r-efi" },
]

[bans]
# Fail CI on any duplicate dependency version not explicitly skipped below. This
# is what caught the hashbrown 0.16/0.17 split; keeping it as "deny" prevents a
# silent re-introduction. Each skip is a duplicate forced by a transitive
# dependency (swc_core or libafl) that we cannot deduplicate from our side.
# Re-evaluate this list when bumping swc_core or the libafl rev.
multiple-versions = "deny"
skip = [
  { crate = "cargo-platform@0.1.9", reason = "swc_core internal: testing uses cargo_metadata 0.18" },
  { crate = "cargo_metadata@0.18.1", reason = "swc_core internal: testing vs vergen" },
  { crate = "hashbrown@0.14.5", reason = "swc hstr/allocator require 0.14 alongside our 0.17" },
  { crate = "siphasher@0.3.11", reason = "swc_common requires 0.3" },
  { crate = "thiserror@1.0.69", reason = "swc_core testing transitive via cargo_metadata 0.18" },
  { crate = "thiserror-impl@1.0.69", reason = "follows thiserror 1.x" },
  { crate = "unicode-width@0.1.14", reason = "swc_core internal: miette requires 0.1" },
  { crate = "wit-bindgen@0.51.0", reason = "libafl getrandom wasm deps require 0.51 alongside swc" },
]

[sources]
unknown-registry = "deny"
allow-git = ["https://github.com/AFLplusplus/LibAFL"]
